# 9RX security headers
# Include inside the HTTPS server block:
#   include /etc/nginx/snippets/security-headers.conf;

# Force HTTPS for future visits (enable preload only after validating subdomains)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Browser hardening
add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header X-XSS-Protection "1; mode=block" always;

# Restrict powerful browser features
add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), geolocation=(self), gyroscope=(), magnetometer=(), microphone=(), payment=(self), usb=()" always;

# CSP tuned for the current app stack (Supabase, Mapbox, payment JS, analytics)
add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; object-src 'none'; script-src 'self' https://js.authorize.net https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://9rx.com https://www.9rx.com https://*.supabase.co wss://*.supabase.co https://api.mapbox.com https://events.mapbox.com https://www.google-analytics.com; frame-src 'self' https://js.authorize.net; worker-src 'self' blob:; upgrade-insecure-requests" always;
